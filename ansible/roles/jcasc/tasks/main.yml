# ansible/roles/jcasc/tasks/main.yml
---

- name: Ensure Jenkins JCasC directory exists
  file:
    path: /var/lib/jenkins/casc_configs
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"
  become: true


- name: Deploy Jenkins Configuration as Code file
  copy:
    src: jenkins.yaml
    dest: /var/lib/jenkins/casc_configs/jenkins.yaml
    owner: jenkins
    group: jenkins
    mode: "0644"
  become: true


# PLUGIN INSTALLATION (THIS IS THE CRITICAL MISSING STEP)

- name: Download jenkins-plugin-cli
  get_url:
    url: https://repo.jenkins-ci.org/public/io/jenkins/jenkins-plugin-cli/2.13.0/jenkins-plugin-cli-2.13.0.jar
    dest: /usr/local/bin/jenkins-plugin-cli.jar
    mode: "0755"
  become: true


- name: Install Jenkins plugins from plugins.txt
  command: >
    java -jar /usr/local/bin/jenkins-plugin-cli.jar
    --plugin-file {{ role_path }}/files/plugins.txt
    --plugin-dir /var/lib/jenkins/plugins
  become: true
  become_user: jenkins
  environment:
    JENKINS_HOME: /var/lib/jenkins


# THIS IS THE MISSING PIECE
- name: Ensure systemd drop-in directory for Jenkins exists
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    mode: "0755"
  become: true


- name: Configure Jenkins environment variables for JCasC and GitHub
  copy:
    dest: /etc/systemd/system/jenkins.service.d/jcasc-env.conf
    content: |
      [Service]
      Environment="CASC_JENKINS_CONFIG=/var/lib/jenkins/casc_configs/jenkins.yaml"
      Environment="GITHUB_USERNAME={{ github_username }}"
      Environment="GITHUB_TOKEN={{ github_token }}"
  become: true


- name: Reload systemd and restart Jenkins
  systemd:
    daemon_reload: true
    name: jenkins
    state: restarted
  become: true