# ansible/roles/jcasc/tasks/main.yml
---

- name: Ensure JCasC directory exists
  file:
    path: /var/lib/jenkins/casc_configs
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"
  become: true


- name: Deploy JCasC config
  copy:
    src: jenkins.yaml
    dest: /var/lib/jenkins/casc_configs/jenkins.yaml
    owner: jenkins
    group: jenkins
    mode: "0644"
  become: true
  

# Ensure Jenkins init.groovy.d directory exists
- name: Ensure Jenkins init.groovy.d directory exists
  file:
    path: /var/lib/jenkins/init.groovy.d
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"
  become: true


# PROVEN PLUGIN INSTALL METHOD (NO EXTERNAL DOWNLOADS)
- name: Install plugins via init.groovy.d
  copy:
    src: install-plugins.groovy
    dest: /var/lib/jenkins/init.groovy.d/install-plugins.groovy
    owner: jenkins
    group: jenkins
    mode: "0644"
  become: true


- name: Ensure systemd drop-in exists
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    mode: "0755"
  become: true


- name: Configure Jenkins environment for JCasC
  copy:
    dest: /etc/systemd/system/jenkins.service.d/jcasc-env.conf
    content: |
      [Service]
      Environment="CASC_JENKINS_CONFIG=/var/lib/jenkins/casc_configs/jenkins.yaml"
      Environment="GITHUB_USERNAME={{ github_username }}"
      Environment="GITHUB_TOKEN={{ github_token }}"
  become: true


- name: Restart Jenkins
  systemd:
    name: jenkins
    daemon_reload: true
    state: restarted
  become: true