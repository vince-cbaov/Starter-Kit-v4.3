---
# Jenkins on Debian/Ubuntu with modern signed-by keyring (2026 key)

# -------------------------------------------------
# Base Dependencies
# -------------------------------------------------

- name: Install base dependencies (Java + Git + tools)
  apt:
    name:
      - fontconfig
      - openjdk-21-jre
      - git
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  become: true
  ignore_errors: true

- name: Fallback to Java 17 if Java 21 not available
  apt:
    name: openjdk-17-jre
    state: present
    update_cache: yes
  become: true
  when: ansible_failed_result is defined or false


# -------------------------------------------------
# Jenkins Repository & Install
# -------------------------------------------------

- name: Remove old Jenkins keyring if present
  file:
    path: /usr/share/keyrings/jenkins-keyring.asc
    state: absent
  become: true

- name: Download Jenkins repository GPG key (2026)
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /usr/share/keyrings/jenkins-keyring.asc
    mode: "0644"
    force: true
  become: true

- name: Add Jenkins apt repository
  copy:
    dest: /etc/apt/sources.list.d/jenkins.list
    content: |
      deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/
    mode: "0644"
  become: true

- name: Update apt cache after Jenkins repo add
  apt:
    update_cache: yes
  become: true

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
  become: true

- name: Ensure Jenkins service is running
  service:
    name: jenkins
    state: started
    enabled: yes
  become: true


# -------------------------------------------------
# Firewall (Jenkins UI)
# -------------------------------------------------

- name: Allow Jenkins 8080 in UFW
  community.general.ufw:
    rule: allow
    port: "8080"
    proto: tcp
    comment: "Jenkins UI"
  when:
    - ansible_facts['os_family'] == 'Debian'
    - "'jenkins' in group_names"
  notify: reload ufw
  become: true


# -------------------------------------------------
# Azure CLI (Official Microsoft repo)
# -------------------------------------------------

- name: Ensure Azure CLI keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Microsoft GPG key
  get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: "0644"
  become: true

- name: Convert Microsoft GPG key to keyring
  command: >
    gpg --dearmor
    --yes
    -o /etc/apt/keyrings/microsoft.gpg
    /etc/apt/keyrings/microsoft.asc
  args:
    creates: /etc/apt/keyrings/microsoft.gpg
  become: true

- name: Add Azure CLI repository
  apt_repository:
    repo: >
      deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg]
      https://packages.microsoft.com/repos/azure-cli/
      {{ ansible_distribution_release }}
      main
    filename: azure-cli
    state: present
  become: true

- name: Install Azure CLI
  apt:
    name: azure-cli
    state: present
    update_cache: true
  become: true


# -------------------------------------------------
# kubectl (Snap)
# -------------------------------------------------

- name: Install kubectl via snap
  snap:
    name: kubectl
    classic: true
    state: present
  become: true


# -------------------------------------------------
# Helm (Snap)
# -------------------------------------------------

- name: Install Helm via snap
  snap:
    name: helm
    classic: true
    state: present
  become: true


# -------------------------------------------------
# SCANNING & STATIC ANALYSIS TOOLS (CI‑ONLY)
# -------------------------------------------------

# Shell script linting
- name: Install ShellCheck
  apt:
    name: shellcheck
    state: present
  become: true

# YAML linting
- name: Install yamllint
  apt:
    name: yamllint
    state: present
  become: true

# Git secret scanning (AWS maintained tool)
- name: Install git-secrets
  apt:
    name: git-secrets
    state: present
  become: true

# Trivy (filesystem + image scanning)
# Install prerequisites
- name: Install required packages
  apt:
    name:
      - wget
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true
  become: true

# Add Trivy GPG key
- name: Add Trivy GPG key
  shell: |
    wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
    | gpg --dearmor \
    | tee /usr/share/keyrings/trivy.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/trivy.gpg
  become: true

# Add Trivy APT repository
- name: Add Trivy APT repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main"
    filename: trivy
    state: present
  become: true

# Install Trivy
- name: Install Trivy
  apt:
    name: trivy
    state: present
    update_cache: true
  become: true

# -------------------------------------------------
# PowerShell (Microsoft official repo)
# -------------------------------------------------

- name: Ensure Microsoft keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Microsoft signing key (PowerShell)
  get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: "0644"
  become: true

- name: Convert Microsoft signing key to GPG format
  command: >
    gpg --dearmor
    --yes
    -o /etc/apt/keyrings/microsoft.gpg
    /etc/apt/keyrings/microsoft.asc
  args:
    creates: /etc/apt/keyrings/microsoft.gpg
  become: true

- name: Add Microsoft PowerShell APT repository
  apt_repository:
    repo: >
      deb [signed-by=/etc/apt/keyrings/microsoft.gpg]
      https://packages.microsoft.com/repos/microsoft-ubuntu-{{ ansible_distribution_release }}-prod
      {{ ansible_distribution_release }}
      main
    filename: microsoft-powershell
    state: present
  become: true


# -------------------------------------------------
# Verification (Fail Fast)
# -------------------------------------------------

- name: Verify Java
  command: java -version
  changed_when: false

- name: Verify Jenkins
  command: systemctl is-active jenkins
  changed_when: false

- name: Verify Azure CLI
  command: az version
  changed_when: false

- name: Verify kubectl
  command: kubectl version --client
  changed_when: false

- name: Verify Helm
  command: helm version
  changed_when: false

- name: Verify Trivy
  command: trivy --version
  changed_when: false

- name: Verify ShellCheck
  command: shellcheck --version
  changed_when: false

- name: Verify yamllint
  command: yamllint --version
  changed_when: false

- name: Verify git-secrets is installed
  shell: command -v git-secrets
  register: git_secrets_path
  changed_when: false

- name: Verify PowerShell Core is available
  command: which pwsh
  changed_when: false