---
# Docker host configuration
# - Install Docker
# - Disable Docker Remote API entirely
# - Use local Unix socket only
# - Designed for Jenkins → SSH → docker build
# - Install Azure CLI, kubectl, Helm, Java 21

# -------------------------------------------------
# Base system prep
# -------------------------------------------------

- name: Ensure apt cache is up to date
  apt:
    update_cache: yes
  changed_when: false
  become: true


# -------------------------------------------------
# Docker installation
# -------------------------------------------------

- name: Install Docker engine
  apt:
    name: docker.io
    state: present
  become: true

- name: Ensure Docker service is enabled
  systemd:
    name: docker
    enabled: true
    state: started
  become: true

  # -------------------------------------------------
# Allow Jenkins SSH user to access Docker
# -------------------------------------------------

- name: Ensure Jenkins SSH user can access Docker
  user:
    name: vinadmin
    groups: docker
    append: yes

# -------------------------------------------------
# Configure Docker to use LOCAL SOCKET ONLY
# (No TCP sockets, no TLS, no remote API)
# -------------------------------------------------

- name: Configure Docker daemon (local socket only)
  copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "hosts": ["unix:///var/run/docker.sock"]
      }
  become: true


# -------------------------------------------------
# Ensure Docker uses daemon.json and not fd://
# -------------------------------------------------

- name: Ensure systemd drop-in directory exists
  file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Write systemd override to clear ExecStart (-H fd://)
  copy:
    dest: /etc/systemd/system/docker.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/bin/dockerd
  become: true


# -------------------------------------------------
# Validate Docker configuration before restart
# -------------------------------------------------

- name: Validate /etc/docker/daemon.json
  shell: "python3 -m json.tool /etc/docker/daemon.json > /dev/null"
  changed_when: false
  become: true


# -------------------------------------------------
# Restart Docker cleanly
# -------------------------------------------------

- name: Restart Docker
  systemd:
    name: docker
    state: restarted
    daemon_reload: true
  become: true


# -------------------------------------------------
# Post-checks (fail fast if remote API is exposed)
# -------------------------------------------------

- name: Assert Docker Remote API is disabled
  shell: "ss -lntp | egrep ':(2375|2376)' || true"
  register: docker_api_ports
  changed_when: false
  become: true

- name: Fail if Docker Remote API ports are open
  fail:
    msg: >
      SECURITY ERROR: Docker Remote API is listening on TCP ports
      (2375/2376). This host must use SSH + local socket only.
  when: docker_api_ports.stdout != ""


# -------------------------------------------------
# Azure CLI installation (official Microsoft repo)
# -------------------------------------------------

- name: Install Azure CLI prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  become: true

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Download Microsoft GPG key
  get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: "0644"
  become: true

- name: Convert Microsoft GPG key to keyring
  command: >
    gpg --dearmor
    --yes
    -o /etc/apt/keyrings/microsoft.gpg
    /etc/apt/keyrings/microsoft.asc
  args:
    creates: /etc/apt/keyrings/microsoft.gpg
  become: true

- name: Add Azure CLI repository
  apt_repository:
    repo: >
      deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg]
      https://packages.microsoft.com/repos/azure-cli/
      {{ ansible_distribution_release }}
      main
    filename: azure-cli
    state: present
  become: true

- name: Install Azure CLI
  apt:
    name: azure-cli
    state: present
    update_cache: true
  become: true


# -------------------------------------------------
# kubectl installation (Snap – avoids apt repo issues)
# -------------------------------------------------

- name: Install kubectl via snap
  snap:
    name: kubectl
    classic: true
    state: present
  become: true


# -------------------------------------------------
# Helm installation (Snap)
# -------------------------------------------------

- name: Install Helm via snap
  snap:
    name: helm
    classic: true
    state: present
  become: true


# -------------------------------------------------
# Java installation (OpenJDK 21)
# -------------------------------------------------

- name: Install OpenJDK 21
  apt:
    name: openjdk-21-jdk
    state: present
    update_cache: true
  become: true


# -------------------------------------------------
# Verification / sanity checks
# -------------------------------------------------

- name: Verify Azure CLI
  command: az version
  changed_when: false

- name: Verify kubectl
  command: kubectl version --client
  changed_when: false

- name: Verify Helm
  command: helm version
  changed_when: false

- name: Verify Java
  command: java -version
  changed_when: false