name: Build and Deploy to AKS

on:
  push:
    branches: ["main"]

env:
  ACR_NAME: starterkitacr
  AKS_RG: sk-dev2-rg
  AKS_NAME: sk-dev2-aks
  CHART_PATH: helm/myapp
  IMAGE_NAME: myapp
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Authenticate to Azure (Service Principal OR OIDC)
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: $AKS_RG
          cluster-name: $AKS_NAME

      - name: Deploy with Helm
        run: |
          helm upgrade --install myapp $CHART_PATH \
            --namespace $NAMESPACE \
            --create-namespace \
            --set replicaCount=1 \
            --set image.repository=$ACR_NAME.azurecr.io/$IMAGE_NAME \
            --set image.tag=${{ github.sha }}
