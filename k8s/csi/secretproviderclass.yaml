apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: akv-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: "skdevkv"
    tenantId: "ec7789f0-7ef2-4ff6-89b1-a74d3fc8f81c"
    objects: |
      array:
        - |
          objectName: acr-sp-app-id
          objectType: secret
        - |
          objectName: acr-sp-secret
          objectType: secret
        - |
          objectName: acr-sp-tenant-id
          objectType: secret
  secretObjects: []
